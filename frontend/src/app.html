<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link
			id="app-favicon"
			rel="icon"
			type="image/svg+xml"
			href="%sveltekit.assets%/assets/favicon-light.svg?v=1"
			data-light-href="%sveltekit.assets%/assets/favicon-light.svg?v=1"
			data-dark-href="%sveltekit.assets%/assets/favicon-dark.svg?v=1"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
